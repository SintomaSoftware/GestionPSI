<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayuda y Tutoriales - Gestión PSI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        /* Reutilizamos tu base estética */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #050505; /* Fondo negro como pediste */
            color: #dfe6e9;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* BANNER SUPERIOR (Copiado de tu landing para consistencia) */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5,5,5,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(162,155,254,0.1);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            text-decoration: none;
        }

        .nav-logo i {
            color: #a29bfe;
            font-size: 1.4rem;
            filter: drop-shadow(0 0 8px rgba(162,155,254,0.6));
        }

        /* CONTENEDOR PRINCIPAL */
        .tutorial-container {
            max-width: 1200px;
            margin: 120px auto 60px; /* Margen para no quedar debajo del nav */
            padding: 0 20px;
        }

        .section-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .section-header h1 {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 10px;
        }

        .section-header h1 span { color: #a29bfe; }

        /* LA GRILLA: FOTO IZQUIERDA | VIDEO DERECHA */
        .tutorial-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Dos columnas iguales */
            gap: 40px;
            align-items: start;
            background: rgba(255,255,255,0.02);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(162,155,254,0.1);
        }

        /* Espacio para tu Foto */
        .photo-space {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            background: #111; /* Fondo por si la foto tarda en cargar */
        }

        .photo-space img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Espacio para el Video (Mantiene proporción 16:9) */
        .video-space {
            position: relative;
            padding-bottom: 56.25%; /* Proporción 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid rgba(162,155,254,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-space iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-caption {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #a29bfe;
            font-weight: 600;
        }

        /* FOOTER SIMPLE */
        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid rgba(255,255,255,0.06);
            margin-top: 60px;
        }

        footer p { font-size: 0.8rem; color: #636e72; }

        /* RESPONSIVE: En celulares se pone uno abajo del otro */
        @media (max-width: 900px) {
            .tutorial-grid {
                grid-template-columns: 1fr;
            }
            .section-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <i class="fas fa-brain"></i>
            Gestión PSI
        </a>
    </nav>

    <main class="tutorial-container">
        <header class="section-header">
            <h1>Ayuda y <span>Tutoriales</span></h1>
            <p>Aprendé a usar Gestión PSI en pocos minutos.</p>
        </header>

        <section class="tutorial-grid">
            <div class="photo-space">
                <img src="https://sintomasoftware.com.ar/assets/imagenes/agenda.jpeg" alt="Instructivo vista de la App">
            </div>

            <div>
                <div class="video-space">
                    <iframe 
                        src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                        title="Tutorial Gestión PSI" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>
                <p class="video-caption"><i class="fab fa-youtube"></i> Video Tutorial: Cómo completar esta vista</p>
                <p style="margin-top: 10px; font-size: 0.85rem; color: #b2bec3; line-height: 1.5;">
                    En este video te explicamos paso a paso cómo cargar los datos de esta sección para mantener tu agenda organizada.
                </p>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Gestión PSI · Sintoma Software</p>
    </footer>

</body>
</html>
