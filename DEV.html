<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión PSI</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">        
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gestión PSI">
    <link rel="apple-touch-icon" href="cerebro.png?v=4">
    <link rel="icon" type="image/png" href="cerebro.png?v=4">
    <link rel="manifest" href="manifest-dev.json">
    <meta name="theme-color" content="#6c5ce7">
    <style>
    body, html { 
        margin: 0; padding: 0; 
        height: 100%; width: 100%;
        overflow: hidden; 
        background-color: #6c5ce7;
    }
    iframe { width: 100%; height: 100%; border: none; }

    /* Solo desktop/tablet ancha (≥600px): centrar el iframe a 505px.
       En mobile (<600px) esta regla no se aplica: todo queda igual que hoy. */
    @media (min-width: 600px) {
        body {
            display: flex;
            justify-content: center;
            background-color: #050505;
        }
        iframe {
            width: 505px;
            max-width: 100%;
        }
    }
</style>
</head>
<body>
    <iframe id="appFrame" src="" allow="geolocation; microphone; camera; fullscreen"></iframe>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxsNI91AKtzNHLfasbtbmdGf4e-QGTM8ExUo-G5c6okhTvXIKVKkQyygY5Qv_e2VOFWBA/exec";
        // ¿Vienen datos de sesión desde paginaPuente?
        const params = new URLSearchParams(window.location.search);
        const email = params.get('e');
        const token = params.get('t');
        const walkthrough = params.get('w');
        if (email && token) {
            // Guardar en localStorage de sintomasoftware.com.ar
            localStorage.setItem("usuario_gestion_psi", decodeURIComponent(email));
            localStorage.setItem("token_gestion_psi", decodeURIComponent(token));
            localStorage.setItem("psi_onboarding_status", decodeURIComponent(walkthrough || 'ACTIVO'));
            // Limpiar URL
            window.history.replaceState({}, document.title, "/");
        }
        // Construir URL del iframe con sesión si existe
        const sesionEmail = localStorage.getItem("usuario_gestion_psi");
        const sesionToken = localStorage.getItem("token_gestion_psi");
        let iframeSrc = SCRIPT_URL;
        if (sesionEmail && sesionToken) {
        const walkthrough = localStorage.getItem("psi_onboarding_status") || "INACTIVO";
        iframeSrc += `?e=${encodeURIComponent(sesionEmail)}&t=${encodeURIComponent(sesionToken)}&w=${encodeURIComponent(walkthrough)}`;
        }
        document.getElementById('appFrame').src = iframeSrc;

        // ============================================================
        // Puente para login con Google nativo desde Android (WebView)
        // Android llama a esta función con evaluateJavascript.
        // Recargamos el iframe pasando el email por querystring.
        // El frontend lo detecta en ejecutarVerificacionInicial() via
        // google.script.url.getLocation() y dispara la validacion.
        // ============================================================
       window.loginGoogleDesdeAndroid = function(email) {
            console.log("loginGoogleDesdeAndroid recibido:", email);
            if (!email || !email.includes('@')) {
                console.log("Email invalido, abortando");
                return;
            }
            const iframe = document.getElementById('appFrame');
            if (!iframe) {
                console.log("Iframe no encontrado");
                return;
            }
            iframe.src = SCRIPT_URL + '?ga=' + encodeURIComponent(email);
        };

        // ============================================================
        // Puente para login con Google desde iOS PWA
        // Cuando el OAuth completa, PROD.html recibe ?e= y ?t= y los
        // guarda en localStorage (ya resuelto arriba). Cuando el usuario
        // vuelve a la PWA, visibilitychange detecta la sesión nueva
        // y recarga el iframe autenticado — replicando el flujo de Android.
        // Solo aplica en iOS PWA (standalone). Android y web no entran acá.
        // ============================================================
        var esIOSPWA = /iPhone|iPad|iPod/i.test(navigator.userAgent) &&
                       window.navigator.standalone === true;

            if (esIOSPWA) {
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible') {
                    var emailGuardado = localStorage.getItem("usuario_gestion_psi");
                    var tokenGuardado = localStorage.getItem("token_gestion_psi");
                    var iframe = document.getElementById('appFrame');

                    // Si hay sesión en localStorage y el iframe aún no la tiene cargada
                    if (emailGuardado && tokenGuardado && iframe) {
                        var walkthroughGuardado = localStorage.getItem("psi_onboarding_status") || "ACTIVO";
                        var srcEsperado = SCRIPT_URL +
                            '?e=' + encodeURIComponent(emailGuardado) +
                            '&t=' + encodeURIComponent(tokenGuardado) +
                            '&w=' + encodeURIComponent(walkthroughGuardado);

                        // Solo recargamos si el iframe no tiene ya esa sesión
                        if (iframe.src !== srcEsperado) {
                            console.log("iOS PWA: sesión detectada al volver al foco, cargando app");
                            iframe.src = srcEsperado;
                        }
                    }
                }
            });
        }

        // Limpia sesión cuando el iframe lo solicita via postMessage (todos los dispositivos)
        window.addEventListener('message', function(event) {
            if (event.origin !== 'https://n-oza7vapfmlgh4u5s75xwqmm6glaoz24pmak67li-0lu-script.googleusercontent.com') return;
            if (event.data && event.data.accion === 'cerrarSesion') {
                localStorage.removeItem('usuario_gestion_psi');
                localStorage.removeItem('token_gestion_psi');
                localStorage.removeItem('psi_onboarding_status');
            }
        });
    </script>
</body>
</html>
