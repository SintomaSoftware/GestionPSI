<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayuda y Tutoriales - Gestión PSI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        /* Reutilizamos tu base estética */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #050505; /* Fondo negro como pediste */
            color: #dfe6e9;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* BANNER SUPERIOR (Copiado de tu landing para consistencia) */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5,5,5,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(162,155,254,0.1);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            text-decoration: none;
        }

        .nav-logo i {
            color: #a29bfe;
            font-size: 1.4rem;
            filter: drop-shadow(0 0 8px rgba(162,155,254,0.6));
        }

        /* CONTENEDOR PRINCIPAL */
        .tutorial-container {
            max-width: 1400px;
            margin: 120px auto 60px; /* Margen para no quedar debajo del nav */
            padding: 0 20px;
        }

        .section-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .section-header h1 {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 10px;
        }

        .section-header h1 span { color: #a29bfe; }

        /* LA GRILLA: FOTO IZQUIERDA | VIDEO DERECHA */
        .tutorial-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: start;
    max-width: 1000px; /* Reducimos el ancho total para que los verticales luzcan mejor */
    margin: 0 auto;
}

        /* Espacio para tu Foto */
        .photo-space {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            background: #111; /* Fondo por si la foto tarda en cargar */
        }

        .photo-space img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Espacio para el Video (Mantiene proporción 9:16) */
        .video-space {
    position: relative;
    width: 100%;
    /* 1. AJUSTE DE TAMAÑO: Bajalo a 320px o 350px para que calce con la imagen */
    max-width: 320px; 
    margin: 0 auto;
    padding-bottom: 177.77%; /* Proporción 9:16 */
    height: 0;
    overflow: hidden;
    
    /* 2. ESTILO NEÓN: Borde y sombra */
    border-radius: 30px; /* Bordes redondeados como un celular moderno */
    border: 2px solid rgba(162, 155, 254, 0.4); /* Tu color violeta con transparencia */
    box-shadow: 0 0 20px rgba(162, 155, 254, 0.2), inset 0 0 10px rgba(0,0,0,0.5);
    background: #000;
}

        .video-space iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
}

        .video-caption {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #a29bfe;
            font-weight: 600;
        }

        /* FOOTER SIMPLE */
        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid rgba(255,255,255,0.06);
            margin-top: 60px;
        }

        footer p { font-size: 0.8rem; color: #636e72; }

        /* RESPONSIVE: En celulares se pone uno abajo del otro */
        @media (max-width: 900px) {
            .tutorial-grid {
                grid-template-columns: 1fr;
            }
            .section-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <i class="fas fa-brain"></i>
            Gestión PSI
        </a>
    </nav>

    <main class="tutorial-container">
        <header class="section-header">
            <h1>Cargar <span>Sesión</span></h1>
            <p>Aprendé cómo ingresar cada sesión.</p>
        </header>

        <section class="tutorial-grid">
            <div class="photo-space">
                <img src="https://sintomasoftware.com.ar/assets/cargarsesion.png" alt="Instructivo vista de la App">
            </div>

            <div>
                <div class="video-space">
                    <iframe 
                        src="https://www.youtube.com/embed/SFjVmpksOT0"
                        title="Tutorial Gestión PSI" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>
                <p class="video-caption"><i class="fab fa-youtube"></i> Video Tutorial: Cómo completar esta vista</p>
                <p style="margin-top: 10px; font-size: 0.85rem; color: #b2bec3; line-height: 1.5;">
                    En este video te explicamos paso a paso cómo cargar los datos de esta sección para mantener tu consultorio organizado.
                </p>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Gestión PSI · Sintoma Software</p>
    </footer>

</body>
</html>
