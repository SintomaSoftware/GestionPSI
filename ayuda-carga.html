<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayuda y Tutoriales - Gestión PSI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #050505;
            color: #dfe6e9;
            overflow-x: hidden;
            min-height: 100vh;
        }

        nav {
            position: fixed; top: 0; width: 100%; z-index: 100; padding: 18px 40px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(5,5,5,0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(162,155,254,0.1);
        }

        .nav-logo {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; color: white; text-decoration: none;
        }

        .nav-logo i {
            color: #a29bfe; font-size: 1.4rem;
            filter: drop-shadow(0 0 8px rgba(162,155,254,0.6));
        }

        .tutorial-container {
            max-width: 1200px;
            margin: 60px auto 60px;
            padding: 0 20px;
        }

        .section-header { text-align: center; margin-bottom: 50px; }
        .section-header h1 { font-size: 2.5rem; color: white; }
        .section-header h1 span { color: #a29bfe; }

        /* GRILLA PRINCIPAL REORDENADA */
        .tutorial-grid {
            display: grid;
            /* Invertimos: Video (1) | Contenido (1.5) */
            grid-template-columns: 1fr 1.5fr; 
            gap: 50px;
            align-items: start;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* COLUMNA DERECHA: TEXTO + IMAGEN */
        .content-column {
            display: flex;
            flex-direction: column;
            gap: 30px; /* Espacio entre el texto y la imagen */
        }

        .photo-space {
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid rgba(162,155,254,0.2);
            background: #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .photo-space img { width: 100%; height: auto; display: block; }

        .video-wrapper {
            width: 100%;
            max-width: 350px; /* Un poco más grande para el lado izquierdo */
            margin: 0;
        }

        .video-frame {
            position: relative;
            width: 100%;
            padding-bottom: 177.77%;
            height: 0;
            background: #000;
            border-radius: 35px;
            border: 2px solid rgba(162,155,254,0.4);
            box-shadow: 0 0 25px rgba(162,155,254,0.2);
            overflow: hidden;
        }

        .video-frame iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        .video-info { text-align: left; }
        .video-caption { color: #a29bfe; font-weight: 600; margin-bottom: 12px; display: block; font-size: 1.1rem; }
        .video-description { font-size: 1rem; color: #b2bec3; line-height: 1.6; }

        footer {
            text-align: center; padding: 40px;
            border-top: 1px solid rgba(255,255,255,0.06);
            margin-top: 60px;
        }
        footer p { font-size: 0.8rem; color: #636e72; }

        @media (max-width: 900px) {
            .tutorial-grid { grid-template-columns: 1fr; gap: 40px; }
            .video-wrapper { max-width: 320px; margin: 0 auto; }
            .content-column { order: -1; } /* El texto sale primero en móvil */
        }
    </style>
</head>
<body>

    <nav>
        <a href="landing.html" class="nav-logo">
            <i class="fas fa-brain"></i> Gestión PSI
        </a>
    </nav>

    <main class="tutorial-container">
        <header class="section-header">
            <h1>Cargar <span>Sesión</span></h1>
            <p>Aprendé cómo ingresar cada sesión paso a paso.</p>
        </header>

        <section class="tutorial-grid">
            
            <div class="video-wrapper">
                <div class="video-frame">
                    <iframe 
                        src="https://www.youtube.com/embed/YMPRHqLoYJs?rel=0&modestbranding=1" 
                        title="Tutorial Gestión PSI" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="content-column">
                <div class="video-info">
                    <span class="video-caption"><i class="fab fa-youtube"></i> Video Tutorial</span>
                    <p class="video-description">
                        En este video te explicamos cómo completar esta sección para mantener tu consultorio organizado y tus finanzas al día.
                    </p>
                </div>

                <div class="photo-space">
                    <img src="https://sintomasoftware.com.ar/assets/cargarsesion.png" alt="Instructivo vista de la App">
                </div>
            </div>

        </section>
    </main>

    <footer>
        <p>© 2026 Gestión PSI · Sintoma Software</p>
    </footer>

</body>
</html>
